<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="src/output.css" />
  </head>
  <body class="bg-gray-600 flex justify-center items-center min-h-screen">
    <div class="bg-gray-500 rounded-lg p-8 shadow-2xl max-w-sm w-full">
      <h2 class="text-center text-3xl text-white mb-6 font-bold">Login</h2>
      <form action="#">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-300 mb-2" for=""
            >Email</label
          >
          <input
            type="email"
            name=""
            id=""
            placeholder="username@gmail.com"
            class="w-full px-3 py-2 rounded-lg bg-gray-300 border-gray-700 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>
        <div class="mb-6">
          <label for="" class="block text-sm font-medium text-gray-300 mb-2"
            >Password</label
          >
          <input
            type="password"
            name=""
            id=""
            placeholder="********"
            class="w-full px-3 py-2 rounded-lg bg-gray-300 border-gray-700 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>
        <div>
          <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg cursor-pointer hover:bg-blue-700 shadow-2xl">Login</button>
        </div>
      </form>
    </div>
  </body>
</html>
