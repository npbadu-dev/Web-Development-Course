<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        .container{
            background-color: yellow;
            height: 500px;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        .container div{
            margin-top: 150px;
            height: 200px;
            width: 200px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            background-color: red;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="pt-1">1</div>
        <div class="pt-2">2</div>
        <div class="pt-3">3</div>
    </div>
</body>
</html>
