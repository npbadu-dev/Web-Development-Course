<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 1</title>
    <style>
      button {
        background-color: darkslateblue;
        border: none;
        border-radius: 6px;
        color: white;
        padding: 8px 15px;
      }
      button:hover {
        cursor: pointer;
        background-color: cornflowerblue;
      }

      .color-change {
        color: blue;
        font-weight: bolder;
        font-size: 25px;
        font-style: italic;
      }
      .dashed {
        border: 3px dashed black;
        margin-bottom: 10px;
      }
      .box {
        padding: 20px;
        margin: 30px;
        border: 2px solid red;
        background-color: blue;
      }
      .circle {
        border: none;
        background-color: red;
        height: 100px;
        width: 100px;
        border-radius: 50%;
        margin: 20px;
      }
      .square{
        height: 200px;
        width: 200px;
        border: 2px soid #ccc;
        background-color: green;
        box-shadow: 10px 10px 15px gray;
      }
    </style>
  </head>
  <body>
    <div class="dashed">
      <p class="color-change">
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Dicta quod
        minima inventore voluptate. Natus eum excepturi est nostrum autem atque?
      </p>
    </div>
    <button>Click Me</button>
    <div class="box">This is a box with some margin and padding.</div>
    <div class="circle"></div>
    <div class="square"></div>
    
  </body>
</html>
