<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>layout</title>
    <style>
      .parent-container {
        position: relative;
        width: 400px;
        height: 400px;
        background-color: yellow;
      }
      .static {
        position: static;
        background-color: blue;
        height: 100px;
        width: 100px;
      }
      .relative {
        position: relative;
        background-color: green;
        height: 100px;
        width: 100px;
        right: 50px;
        bottom: 50px;
      }
      .absolute{
        position: absolute;
        background-color: red;
        left: 30px;
        height: 100px;
        width: 100px;
      }
    </style>
  </head>
  <body>
    <div class="parent-container">
      <div class="static">Static</div>
      <div class="relative">Relative</div>
      <div class="absolute">Absolute</div>
    </div>
  </body>
</html>
