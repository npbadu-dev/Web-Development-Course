<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOGIN</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #d8e983;
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
      }
      .card {
        background-color: #fffbb1;
        border: none;
        border-radius: 17px;
        height: 300px;
        width: 350px;
      }
      h2 {
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bolder;
        color: #6cd511;
      }
      form {
        display: flex;
        flex-direction: column;
      }
      input {
        margin: 10px;
        padding: 8px;
        border: 2px solid #afeb7a;
        background-color: #caf685;
        border-radius: 4px;
      }
      button {
        margin: 10px;
        padding: 8px;
        background-color: cornflowerblue;
        border: none;
        border-radius: 8px;
        width: 330px;
      }
      button:hover {
        background-color: deepskyblue;
        cursor: pointer;
        color: white;
      }
      .new-account {
        margin: 10px;
        display: flex;
      }

      a {
        align-items: center;
        margin-left: 15px;
        display: block;
        width: 150px;
        text-decoration: none;
        border: 2px solid blue;
        background-color: rgb(41, 247, 175);
        border-radius: 6px;
        padding: 6px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h2>Login</h2>
        <form action="#">
          <input type="email" name="" id="" placeholder="Enter your email" />
          <input type="password" name="" id="" placeholder="password" />
          <button type="submit">Login</button>
          <div class="new-account">
            Create New Account:
            <a href="signup.html" class="signup">SignUp</a>
            <!-- <a href="signup.html" class="signup" target="_blank">SignUp</a> -->
          </div>
        </form>
      </div>
    </div>
    <a href="" ></a>
  </body>
</html>
