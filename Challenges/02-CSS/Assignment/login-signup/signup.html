<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIGNUP</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #d8e983;
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background-color: #fffbb1;
        border: none;
        border-radius: 17px;
        height: 420px;
        width: 350px;
      }
      h2 {
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bolder;
        color: #6cd511;
      }
      form {
        display: flex;
        flex-direction: column;
      }
      input {
        margin: 10px;
        padding: 8px;
        border: 2px solid #afeb7a;
        background-color: #caf685;
        border-radius: 4px;
        width: 300px;
      }
      button {
        margin: 10px;
        padding: 8px;
        background-color: cornflowerblue;
        border: none;
        border-radius: 8px;
      }
        button:hover {
            background-color: deepskyblue;
            cursor: pointer;
            color: white;
        }
      .prev-account {
        margin: 10px;
        display: flex;
      }
      a {
        margin-top: 8px;
        height: 20px;
        align-items: center;
        margin-left: 15px;
        display: block;
        width: 150px;
        text-decoration: none;
        border: 2px solid blue;
        background-color: rgb(41, 247, 175);
        border-radius: 6px;
        padding: 6px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h2>Sign Up</h2>
        <form action="#">
          <label for="user-name">
            <input
              type="text"
              name="user-name"
              placeholder="Enter your Full Name"
            />
          </label>
          <label for="phone">
            <input
              type="number"
              name="phone"
              id=""
              placeholder="enter your phone number"
            />
          </label>
          <label for="email">
            <input
              type="email"
              name="email"
              placeholder="Enter your Email"
              required
            />
          </label>
          <label for="password">
            <input
              type="password"
              name="password"
              placeholder="Enter your Password"
            />
          </label>
          <button type="submit">Sign Up</button>
          <div class="prev-account">
            <p>Already have Account:</p>
            <a href="login.html">Login</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
