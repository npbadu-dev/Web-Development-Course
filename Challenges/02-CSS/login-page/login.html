<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #1a1a1a;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .card {
        border: none;
        border-radius: 5px;
        background-color: rgba(49, 224, 116, 0.941);
        width: 400px;
      }
      h2 {
        color: #fff;
        text-align: center;
      }
      form {
        display: flex;
        flex-direction: column;
        margin: 12px;
      }
      input{
        margin-bottom: 20px;
        padding: 7px;
        border: none;
        border-radius: 5px;
      }
      button{
        background-color: cornflowerblue;
        border: none;
        border-radius: 7px;
        padding: 8px;
      }
      button:hover{
        background-color: royalblue;
        cursor: pointer;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Login</h2>
      <form action="#">
        <input type="email" name="" id="" placeholder="email" required />
        <input type="password" name="" id="" placeholder="Password" />
        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
