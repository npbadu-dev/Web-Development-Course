<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>navigation pannel</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #1a1a1a;
        font-family: Arial, Helvetica, sans-serif;
      }
      .content {
        background-color: burlywood;
        padding: 10px;
        margin-top: 20px;
      }
      ul {
        list-style: none;
        display: flex;
        justify-content: space-around;
        margin: 0;
        padding: 0;
        color: black;
        align-items: center;
      }
      ul li {
        display: inline;
      }
      a {
        text-decoration: none;
        color: black;
        padding: 8px 15px;
        position: relative;
      }
      a::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        height: 2px;
        width: 100%;
        background-color: blue;
        transform: scaleX(0);
        /* scaleY lagayera hernu paryo */
        transition: transform 0.3s ease-in-out;
      }
      a:hover::after{
        transform: scaleX(1);
      }
      button {
        background: cornflowerblue;
        color: white;
        padding: 5px 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      button:hover {
        cursor: pointer;
        background-color: dodgerblue;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="nav-container">
      <div class="content">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Products</a></li>
          <li><button>Login</button></li>
        </ul>
      </div>
    </div>
  </body>
</html>
