<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration From</title>
  </head>
  <body>
    <header>
      <h2>Registration Form</h2>
      <p class="clg-name">
        <b><u>Siddhanath Science campus</u></b>
      </p>
      <div class="details">
        <p class="address">Bhimdatta municipality 18</p>
        <p class="contact">091-123456</p>
      </div>
    </header>
    <hr />
    <main>
      <form action="#">
        <label for="faculty">
          Faculty:
          <input type="text" name="faculty" id="faculty" />
        </label>
        <br />
        <label for="first-name">
          First Name:
          <input type="text" name="first-name" id="first-name" />
        </label>

        <label for="middle-name">
          Middle Name:
          <input type="text" name="middle-name" id="middle-name" />
        </label>

        <label for="last-name">
          Last Name:
          <input type="text" name="last-name" id="last-name" />
        </label>
        <br />
        <label for="birth-date">
          Date of Birth (A.D):
          <input type="date" name="birth-date" id="birth-date" />
        </label>
        <br />
        <label for="father-name">
          Father Name:
          <input type="text" name="father-name" id="father-name" />
        </label>
        <label for="mother-name">
          Mother Name:
          <input type="text" name="mother-name" id="mother-name" />
        </label>
        <br />
        <p>Address</p>
        <label for="province">
          Province:
          <input type="text" name="province" id="province" />
        </label>
        <label for="district">
          District:
          <input type="text" name="district" id="district" />
        </label>
        <label for="municipality">
          Municipality:
          <input type="text" name="municipality" id="municipality" />
        </label>
        <label for="ward-no">
            Ward No :
            <input type="number" name="ward-no" id="ward-no">
        </label>
        <label for="village">
          Village:
          <input type="text" name="village" id="village" />
        </label>
        <br>
        <label for="phone-no">
            Phone:
            <input type="number" name="phone-no" id="phone-no">
        </label>
        <label for="email">
            Email:
            <input type="email" name="email" id="email" required>
        </label>
        <hr>
        <label for="reset">
            reset
            <button type="reset">Reset</button>
        </label>
        <label for="submit">
            Submit
            <button type="submit">Submit</button>
        </label>
      </form>
    </main>
  </body>
</html>
